          <li><a href="">Carta de Serviços</a></li>
        </ul>
      </div>

      <nav>
        <img
          src="./src/img/logo-pequena.png"
          alt="Logo do Projeto Arca"
          id="nav-img"
        />

        <ul class="nav-list">
          <li>
            <a href="./index.html"
              ><span class="mynaui--home-solid"></span> Home</a

          </li>

          <li>
            <a href=""

          <li>

          <li>

    <main class="container">
      <section class="login">
        <div class="center">
          <div class="welcome">
            <h1>Bem vindo ao</h1>
            <img
              src="./src/img/logo.png"
              alt="Imagem grande da logo do projeto"
              id="welcome-img"
            />
          </div>

          <div class="form">
            <h2>Login</h2>

            <form action="">
              <div class="email">
                <label for="email-cpf">Email</label>
                <input type="text" placeholder="Email" />
              </div>

              <div class="password">
                <label for="password">Senha</label>
                <input type="password" placeholder="Senha" />
              </div>

              <div class="form-actions">
                <a href="">Esqueci minha senha</a>
                <button type="submit">Entrar</button>
              </div>

              <p>Não tem conta ainda? <a href="">Crie Agora</a></p>
            </form>
          </div>
        </div>

        <div class="footer">
          <img src="./src/img/rodape.png" alt="Rodapé do site" id="foot-img" />
        </div>
      </section>
    </main>
